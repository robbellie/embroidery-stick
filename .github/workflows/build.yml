name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0  # matches the version this project is actually developed/tested against
          target: esp32s3
          path: '.'

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false  # no external dependencies (go.mod has none) — nothing to cache
      - name: Build
        working-directory: backend
        run: go build -v ./...
      - name: Vet
        working-directory: backend
        run: go vet ./...
