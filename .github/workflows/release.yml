name: Release

# Triggered by pushing a tag like "v1.0.0". Builds the firmware .bin and
# cross-compiled backend executables for Windows/Linux/macOS, then
# attaches them all to a GitHub Release — so users never need to install
# ESP-IDF or Go themselves (see README "foolproof" goal).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: esp32s3
          path: '.'
      - name: Collect firmware artifacts
        run: |
          mkdir -p dist
          cp build/usb_embroidery_stick.bin dist/
          cp build/bootloader/bootloader.bin dist/
          cp build/partition_table/partition-table.bin dist/
      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: dist/

  # Publishes the just-built firmware to docs/ on master, served via
  # GitHub Pages, so the ESP Web Tools install page (docs/index.html)
  # always offers the latest release. Files are served from the same
  # origin as the manifest to avoid cross-origin/CORS issues that come
  # up when a manifest points straight at GitHub Releases assets.
  publish-pages:
    needs: firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/download-artifact@v4
        with:
          name: firmware
          path: docs/firmware
      - name: Set manifest version to this tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}" python3 -c '
          import json, os
          with open("docs/manifest.json") as f:
              m = json.load(f)
          m["version"] = os.environ["VERSION"]
          with open("docs/manifest.json", "w") as f:
              json.dump(m, f, indent=2)
              f.write("\n")
          '
      - name: Commit and push to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/firmware docs/manifest.json
          git diff --cached --quiet || git commit -m "Publish firmware ${GITHUB_REF_NAME} for ESP Web Tools"
          git push origin HEAD:master

  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false
      - name: Build
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          name="embroidery-backend-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -o "$name" .
      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: backend/embroidery-backend-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: [firmware, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts into one release folder
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
